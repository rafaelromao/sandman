<html lang="en">

  <title>Sandman Portal</title>
  <script>
    (function () {
      const themes = new Set({{.SupportedThemesJSON}});
      const storageKey = 'sandman.portal.theme';
      const defaultTheme = 'sandman';
      let theme = defaultTheme;
      try {
        const saved = localStorage.getItem(storageKey);
        if (themes.has(saved)) {
          theme = saved;
        }
      } catch (err) {
      }
      document.documentElement.dataset.theme = theme;
    })();
  </script>

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    a { color: inherit; }
    code, pre, .mono {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace;
      font-variant-numeric: tabular-nums;
    }
    main {
      width: min(100%, 1360px);
      margin: 0 auto;
      padding: 28px 18px 36px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* Topbar: match mockup. Flat rail, left brand + repo, right controls. */
    .masthead {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px 16px;
      padding: 12px 16px 14px;
      margin-bottom: 12px;
      border-bottom: 1px solid color-mix(in oklch, var(--border) 78%, var(--bg));
    }
    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      min-width: 0;
    }
    .topbar-left {
      flex: 1 1 auto;
      gap: 12px;
    }
    .topbar-right {
      flex: 0 0 auto;
      gap: 10px;
      margin-left: auto;
    }
    .masthead-copy {
      display: contents;
    }
    .masthead-brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      flex: 0 0 auto;
    }
    .masthead-brand svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }
    .masthead-brand-text {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      line-height: 1.1;
      white-space: nowrap;
    }
    .masthead-brand-text strong {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .masthead-tagline {
      display: none;
    }
    .masthead-divider {
      width: 1px;
      align-self: stretch;
      min-height: 16px;
      background: color-mix(in oklch, var(--border) 86%, var(--text));
      opacity: 0.8;
      flex: 0 0 auto;
    }
    .masthead-repo {
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .masthead-repo code {
      font-family: inherit;
      font-size: inherit;
      color: inherit;
    }
    /* Poll-health pill: one chip, live state + relative update age. */
    .poll-health {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--muted);
      font-size: 11.5px;
      line-height: 1;
      white-space: nowrap;
    }
    .poll-health .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--muted);
      flex: 0 0 auto;
    }
    .poll-health.ok .dot {
      background: var(--success);
    }
    .poll-health.warn {
      border-color: color-mix(in oklch, var(--warning) 36%, var(--border));
      background: color-mix(in oklch, var(--warning) 10%, var(--surface-2));
      color: var(--warning);
    }
    .poll-health.warn .dot {
      background: var(--warning);
    }
    .poll-health-updated {
      font-variant-numeric: tabular-nums;
    }
    .settings-wrap {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
    }
    .settings-toggle {
      align-self: start;
      min-width: 0;
      padding-inline: 14px;
    }
    .brand-mark {
      display: block;
    }
    /* Context and batch chips live in their own tr (so a single td can
       span all six columns), but visually they are part of the run row
       above: no surface fill, no decorative chrome. The same hover/active
       state that paints the run row also paints the chip row directly
       under it, so the two read as one block. The divider line moves to
       BELOW the chip (inherited border-bottom) so the run row + chip
       read as a single visual block; the next run row starts after the
       chip's own divider. */
    tbody tr.context-row td {
      padding: 0 14px 6px;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    tbody tr.run-row:has(+ tr.context-row) td {
      border-bottom: none;
    }
    tbody tr.run-row + tr.context-row td {
      padding-top: 0;
    }
    tbody tr.run-row:hover + tr.context-row td {
      background: color-mix(in oklch, var(--surface-3) 86%, var(--accent) 8%);
    }
    tbody tr.run-row.active + tr.context-row td {
      background: color-mix(in oklch, var(--accent) 12%, var(--surface));
    }
    .context-chip {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 0;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.04em;
      overflow-wrap: anywhere;
    }
    .context-chip::before {
      content: "·";
      display: inline-block;
      width: 1.25em;
      margin-right: 0.25em;
      color: color-mix(in oklch, var(--muted) 70%, var(--text));
      text-align: center;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 11px;
      color: var(--muted);
    }
    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 2.6vw, 34px);
      line-height: 1.1;
      letter-spacing: -0.04em;
      text-wrap: balance;
    }
    .subtitle {
      margin: 10px 0 0;
      max-width: 68ch;
      color: var(--text);

      font-weight: 600;
      cursor: pointer;
    }
    .settings-toggle:hover { background: var(--surface-3); }
    .settings-toggle[aria-expanded="true"] { background: var(--surface-3); }
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: color-mix(in oklch, var(--bg) 64%, transparent);
      z-index: 38;
    }
    .settings-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: min(380px, 100vw);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 300ms cubic-bezier(0.165, 0.84, 0.44, 1);
      will-change: transform;
      z-index: 39;
      pointer-events: none;
    }
    .settings-panel.open {
      transform: translateX(0);
      pointer-events: auto;
    }
    .settings-panel-shell {
      display: flex;
      flex: 1 1 auto;
      flex-direction: column;
      min-height: 0;
    }
    .settings-panel-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .settings-panel-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }
    .settings-panel-close {
      align-self: start;
      flex: 0 0 auto;
    }
    .settings-panel-body {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
      overflow: auto;
      flex: 1 1 auto;
    }
    .settings-panel-body .theme-control,
    .settings-panel-body .poll-control {
      display: grid;
      gap: 8px;
    }
    .settings-panel-body .theme-control > span,
    .settings-panel-body .poll-control > span {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 10px;
      color: var(--muted);
    }
    .settings-panel-body .poll-control-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .settings-panel-body .poll-control-row input {
      width: 100px;
    }
    .run-row {
      cursor: pointer;
    }
    .run-row:focus-visible td {
      background: color-mix(in oklch, var(--accent) 12%, var(--surface));
    }
    tbody tr.run-row.row-non-expandable {
      cursor: default;
    }
    tbody tr.run-row.row-non-expandable:focus,
    tbody tr.run-row.row-non-expandable:focus-visible {
      outline: none;
      background: transparent;
    }
    tbody tr.run-row.row-non-expandable:focus td,
    tbody tr.run-row.row-non-expandable:focus-visible td {
      background: transparent;
    }
    .run-actions {
      text-align: right;
      white-space: nowrap;
    }
    .action-btn.danger {
      border-color: color-mix(in oklch, var(--danger) 30%, var(--border));
      background: color-mix(in oklch, var(--danger) 12%, var(--surface-2));
      color: color-mix(in oklch, var(--danger) 74%, var(--text));
    }
    .action-btn.danger:hover {
      background: color-mix(in oklch, var(--danger) 18%, var(--surface-3));
    }
    .error-banner {
      display: none;
      margin-bottom: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid color-mix(in oklch, var(--danger) 28%, var(--border));
      background: color-mix(in oklch, var(--danger) 10%, var(--surface));
      color: var(--text);
    }
    @media (min-width: 961px) {
      .toolbar {
        margin-bottom: 0;
        border-bottom: none;
        border-radius: 22px 22px 0 0;
      }
      .filters {
        flex: 1 1 auto;
        min-width: 0;
        gap: 12px;
      }
      .filter-chips {
        gap: 0;
      }
      .filter-chips .fchip[data-status] {
        border-radius: 0;
        padding: 8px 14px;
        background: transparent;
      }
      .filter-chips .fchip[data-status] + .fchip[data-status] {
        margin-left: -1px;
      }
      .filter-chips .fchip[data-status]:first-child {
        border-top-left-radius: 12px;
        border-bottom-left-radius: 12px;
      }
      .filter-chips .fchip[data-status]:last-child {
        border-top-right-radius: 12px;
        border-bottom-right-radius: 12px;
      }
      .filter-chips .fchip[data-status][aria-pressed="true"] {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-ink);
      }
       .fchip.fchip-toggle:hover {

       }
       .fchip-divider {
         display: none;
       }
      .toolbar .status-pill {
        margin-left: auto;
        padding: 0;
        border: none;
        background: transparent;

      }
      .toolbar .status-pill strong {
        color: inherit;
      }
      .toolbar .status-pill .dot {
        background: var(--muted);
      }
      .table-shell {
        border-top: none;
        border-radius: 0 0 22px 22px;
      }
      .col-title { width: 360px; }
      .col-badge { width: 104px; }
      .col-started { width: 196px; }
      .col-duration { width: 112px; }
      .col-issue-title { width: auto; }
      .col-actions { width: 120px; }
      tbody td[data-cell="actions"] {
        text-align: right;
        white-space: nowrap;
      }
      tbody td[data-cell="actions"] .action-btn {
        padding: 6px 8px;
        border-color: transparent;
        background: transparent;
        color: var(--muted);
      }
      tbody td[data-cell="actions"] .action-btn:hover {
        border-color: var(--border);
        background: var(--surface-3);
        color: var(--text);
      }
      tbody td[data-cell="actions"] .action-btn.danger {
        border-color: transparent;

      }

    }
    @media (max-width: 960px) {
      .masthead,

        align-items: center;
        gap: 8px;
        margin-left: 0;
      }

      .detail-grid { grid-template-columns: 1fr; }
      .detail-content,
      .tab-pane,
      .tab-pane.fill {

      }

        left: 0;
        right: 0;

      }

      }
      .filters {

        align-items: center;
      }
      .status-select {

      tbody tr.run-row.active td {

      }

        border: none;

      }

      tbody tr.run-row.row-removed {

      tbody tr.run-row.row-added {

      }
      tbody tr.run-row.row-removed {
        background: color-mix(in oklch, var(--danger) 10%, var(--surface));
      }
      tbody tr.run-row.row-added td,
      tbody tr.run-row.row-removed td {
        background: transparent;
      }
      tbody tr.run-row.active.row-added td {
        background: color-mix(in oklch, var(--accent) 10%, var(--surface));
      }
      tbody tr.run-row.active.row-added {
        background: color-mix(in oklch, var(--accent) 10%, var(--surface));
      }
      tbody tr.run-row td[data-cell="title"] {
        grid-area: title;
        min-width: 0;
      }
      tbody tr.run-row td[data-cell="badge"] {
        grid-area: badge;
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 6px;
      }
      tbody tr.run-row td[data-cell="issue-title"] {
        grid-area: issue;
        min-width: 0;
        white-space: normal;
        color: var(--text);
      }
      tbody tr.run-row td[data-cell="started"] {
        grid-area: started;
        color: var(--muted);
      }
      tbody tr.run-row td[data-cell="duration"] {
        grid-area: duration;
        color: var(--muted);
        justify-self: end;
      }
      tbody tr.run-row td[data-cell="actions"] {
        grid-area: actions;
        display: flex;
        justify-content: flex-end;
        align-items: flex-start;
        gap: 8px;
      }
      tbody tr.run-row td[data-cell="actions"] .action-btn {
        min-width: 44px;
        min-height: 44px;
        padding: 0 12px;
        border-radius: 999px;
        background: transparent;
      }
      tbody tr.detail-row {
        display: block;
        width: 100%;
      }
      tbody tr.detail-row td {
        display: block;
        width: 100%;
        max-width: none;
        background: color-mix(in oklch, var(--accent) 8%, var(--surface-2));
        padding: 0;
        border: none;
      }
      tbody tr.context-row {
        display: block;
        background: transparent;
        margin-top: -16px;
      }
      tbody tr.run-row:hover + tr.context-row,
      tbody tr.run-row.active + tr.context-row {
        background: color-mix(in oklch, var(--accent) 10%, var(--surface));
      }
      tbody tr.context-row td {
        display: block;
        padding: 0 12px 4px;
        border-bottom: none;
      }
    }
    @media (max-width: 760px) {
      main { padding-inline: 12px; }
      h1 { font-size: 24px; }
      .toolbar { padding: 12px; }
      .table-shell { border-radius: 16px; }
      .detail-panel { padding: 14px; }
      .detail-meta {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 12px;
        padding: 12px 14px 14px;
      }
      .detail-box h3 {
        padding-left: 14px;
        padding-right: 14px;
      }
      .kv {
        gap: 2px;
      }
      .kv span {
        font-size: 10px;
      }
      .masthead {
        flex-direction: column;
        align-items: stretch;
      }
      .topbar-left,
      .topbar-right {
        width: 100%;
      }
      .masthead {
        padding: 10px 12px 12px;
        gap: 8px;
      }
      .masthead-brand svg {
        width: 16px;
        height: 16px;
      }
      .masthead-brand-text strong {
        font-size: 11px;
      }
      .settings-wrap {
        gap: 4px;
      }
      .settings-panel {
        width: 100vw;
        border-left: 0;
      }
      .settings-panel-head,
      .settings-panel-body {
        padding-left: 16px;
        padding-right: 16px;
      }
      .col-issue-title,
      th[data-col="issue-title"],
      td[data-cell="issue-title"] {
        display: none;
      }
      .empty-row {
        display: flex;
        width: 100%;
        min-height: 240px;
      }
      .empty-row td {
        display: flex;
        width: 100%;
        padding: 0;
        border: 0;
      }
      .empty-row .empty-state {
        width: 100%;
        display: grid;
        place-items: center;
        min-height: 240px;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .settings-panel {
        transition: none;
      }
      .settings-overlay {
        backdrop-filter: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="masthead">
      <div class="topbar-left">
        <div class="masthead-brand" aria-hidden="true">
          <svg class="brand-mark" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" style="color: var(--accent)">

              <circle cx="264" cy="32" r="3.2" fill="currentColor" opacity="0.65"/>

              <circle cx="264" cy="50" r="3.2" fill="currentColor" opacity="0.65"/>
              <circle cx="56" cy="270" r="3.2" fill="currentColor" opacity="0.65"/>

              <circle cx="56" cy="288" r="3.2" fill="currentColor" opacity="0.65"/>

        <span class="poll-health" id="poll-health" title="Portal poll health" role="status" aria-live="polite">
          <span class="dot"></span>
          <strong class="poll-health-updated" id="last-updated">Waiting for first refresh</strong>
        </span>
        <div class="settings-wrap">

            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

    <div id="settings-overlay" class="settings-overlay" hidden></div>

        <div class="settings-panel-head">
          <h2 id="settings-panel-title">Settings</h2>
          <button id="settings-close" class="settings-toggle settings-panel-close" type="button">Close</button>
        </div>

{{.ThemeOptionsHTML}}
            </select>

            <span>Poll interval</span>

    <div id="error-banner" class="error-banner" role="status" aria-live="polite"></div>

        <select id="status-filter" class="status-select" aria-label="Filter runs by status">
          <option value="all">All</option>
        </select>
        <div class="filter-chips" id="status-chips" role="group" aria-label="Filter runs by status"></div>
        <span class="fchip-divider" aria-hidden="true"></span>
        <div class="filter-toggle-group" role="group" aria-label="Active and archive filters">
          <button id="active-batches" class="fchip fchip-toggle" type="button" aria-pressed="false">Active</button>
          <button id="archived-toggle" class="fchip fchip-toggle" type="button" aria-pressed="false">Archive</button>
        </div>
      </div>
      <div id="summary-pill" class="status-pill"><span class="dot"></span><strong>0</strong><span class="summary-label">runs visible</span></div>
    </section>

    <section class="table-shell" aria-label="Sandman runs">
      <table>
        <colgroup>
          <col class="col-title">
          <col class="col-badge">
          <col class="col-started">
          <col class="col-duration">
          <col class="col-issue-title">
          <col class="col-actions">
        </colgroup>
        <thead>
          <tr>
            <th>Run</th>
            <th data-col="status"><button type="button" class="th-sort" data-sort="status" aria-pressed="false">Status<span class="sort-indicator"></span></button></th>
            <th data-col="started"><button type="button" class="th-sort" data-sort="started" aria-pressed="false">Started<span class="sort-indicator"></span></button></th>
            <th data-col="duration"><button type="button" class="th-sort" data-sort="duration" aria-pressed="false">Duration<span class="sort-indicator"></span></button></th>

            <th>Actions</th>

        </tbody>

  <script>
    const apiPath = "{{.RefreshPath}}";
    const abortPath = "/api/runs/abort";
    const archivePath = "/api/runs/archive";
    const streamPath = "/api/runs/stream";
    let pollInterval = {{.PollInterval}};
    const settingsToggle = document.getElementById('settings-toggle');
    const settingsOverlay = document.getElementById('settings-overlay');
    const settingsPanel = document.getElementById('settings-panel');
    const settingsClose = document.getElementById('settings-close');
    const themePicker = document.getElementById('theme-picker');
    const pollIntervalInput = document.getElementById('poll-interval');
    const themeStorageKey = 'sandman.portal.theme';
    const supportedThemes = new Set({{.SupportedThemesJSON}});
    const statusChips = document.getElementById('status-chips');
    const statusFilter = document.getElementById('status-filter');
    const sortButtons = Array.from(document.querySelectorAll('.th-sort'));
    const activeBatchesToggle = document.getElementById('active-batches');
    const archivedToggle = document.getElementById('archived-toggle');
    const runsBody = document.getElementById('runs-body');
    const errorBanner = document.getElementById('error-banner');
    const summaryPill = document.getElementById('summary-pill');
    const abortSupported = {{.PortalAbortSupported}};
    const portalState = window.SandmanPortalState;
    if (portalState && portalState.configure) {
      portalState.configure({ storageKey: "{{.PortalStateStorageKey}}" });
    }
    const portalScroll = window.SandmanPortalScroll;
    const portalDiff = window.SandmanPortalDiff;
    const persistedPortalState = portalState ? portalState.load() : { expandedRunKey: null, tabs: {}, showArchived: false, activeBatches: false, sortBy: 'started', sortDir: 'desc' };
    let settingsPanelOpen = false;

    function systemTheme() {
      return 'sandman';
    }

    function normalizeTheme(value) {
      if (supportedThemes.has(value)) return value;
      return 'sandman';
    }

    function readStoredTheme() {
      try {
        return normalizeTheme(localStorage.getItem(themeStorageKey) || '');
      } catch (err) {
        return systemTheme();
      }
    }

    function applyTheme(theme, persist) {
      const nextTheme = normalizeTheme(theme);
      document.documentElement.dataset.theme = nextTheme;
      if (themePicker && themePicker.value !== nextTheme) {
        themePicker.value = nextTheme;
      }
      if (persist) {
        try {
          localStorage.setItem(themeStorageKey, nextTheme);
        } catch (err) {
        }
      }
    }

    applyTheme(document.documentElement.dataset.theme || readStoredTheme() || systemTheme(), false);
    if (themePicker) {
      themePicker.value = document.documentElement.dataset.theme || 'sandman';
      themePicker.addEventListener('change', () => applyTheme(themePicker.value, true));
    }

    function setSettingsPanelOpen(open) {
      if (!settingsPanel || !settingsOverlay || !settingsToggle) return;
      settingsPanelOpen = open;
      settingsPanel.classList.toggle('open', open);
      settingsPanel.setAttribute('aria-hidden', String(!open));
      settingsPanel.toggleAttribute('inert', !open);
      settingsOverlay.hidden = !open;
      settingsToggle.setAttribute('aria-expanded', String(open));
      if (open) {
        window.requestAnimationFrame(() => {
          if (themePicker) themePicker.focus({ preventScroll: true });
        });
      } else {
        settingsToggle.focus();
      }
    }

    if (settingsToggle) {
      settingsToggle.addEventListener('click', () => setSettingsPanelOpen(!settingsPanelOpen));
    }
    if (settingsClose) {
      settingsClose.addEventListener('click', () => setSettingsPanelOpen(false));
    }
    if (settingsOverlay) {
      settingsOverlay.addEventListener('click', () => setSettingsPanelOpen(false));
    }

    let refreshTimer = null;

    function restartPolling() {
      if (refreshTimer) {
        clearInterval(refreshTimer);
      }
      refreshTimer = setInterval(refresh, pollInterval);
    }

    // Idle-prewarm of top-N log panes (issue #1564). After every
    // successful refresh, schedule a requestIdleCallback that warms the
    // top-N most-likely-to-be-clicked runs into logPaneCache so the next
    // click hits the cache instead of the cold path. At most one
    // prewarm is in flight per poll cycle (prewarmScheduled gate). The
    // setTimeout(0) fallback keeps environments without
    // requestIdleCallback (some test sandboxes) working.
    const PREWARM_TOP_N = 3;
    const prewarmDisabled = false;
    let prewarmScheduled = false;
    const prewarmHelpers = {
      escapeHTML: escapeHTML,
      formatTime: formatTime,
      formatDuration: formatDuration,
      formatIssueTitle: formatIssueTitle,
      formatSource: formatSource,
      statusClass: statusClass,
      renderRunMeta: renderRunMeta,
      renderTerminalContent: renderTerminalContent,
      isRunAbortable: isRunAbortable,
      isRunArchivable: isRunArchivable,
      highlightJSON: portalDiff && portalDiff.highlightJSON ? portalDiff.highlightJSON : null,
    };
    function scheduleLogPanePrewarm() {
      if (prewarmScheduled) return;
      if (!portalDiff || typeof portalDiff.runPrewarmIfIdle !== 'function') return;
      if (prewarmDisabled) return;
      if (!Array.isArray(state.runs) || state.runs.length === 0) return;
      prewarmScheduled = true;
      const runPrewarm = (idle) => {
        prewarmScheduled = false;
        try {
          portalDiff.runPrewarmIfIdle(state.runs, prewarmHelpers, { topN: PREWARM_TOP_N }, idle);
        } catch (err) {
          // Prewarm is best-effort: any error must not break the live
          // page. The next refresh cycle will schedule another attempt.
        }
      };
      if (typeof window.requestIdleCallback === 'function') {
        window.requestIdleCallback(runPrewarm, { timeout: 2000 });
      } else {
        setTimeout(() => runPrewarm({ didTimeout: false, timeRemaining: () => 50 }), 0);
      }
    }

    if (pollIntervalInput) {
      pollIntervalInput.addEventListener('change', () => {
        const next = Number.parseInt(pollIntervalInput.value, 10);
        pollInterval = Number.isFinite(next) && next >= 500 ? next : 500;
        pollIntervalInput.value = String(pollInterval);
        restartPolling();
      });
    }

    const state = {
      runs: [],
      expandedRunKey: persistedPortalState.expandedRunKey || null,
      tabs: persistedPortalState.tabs || {},
      selectedStatus: 'all',
      activeBatches: persistedPortalState.activeBatches === true,
      showArchived: persistedPortalState.showArchived === true,
      sortBy: persistedPortalState.sortBy || 'started',
      sortDir: persistedPortalState.sortDir || 'desc',
      loading: true,
    };

    // Live log streaming. Only the single expanded run's Log tab is ever
    // streamed; reconcileRunStreams() (called from render()) opens an SSE
    // connection when an active run is expanded on the Log tab and closes
    // it on collapse, tab switch, or when the run goes terminal. The stream
    // bridges the daemon's Control Socket, so the browser tails live output
    // instead of re-reading a 64KB snapshot every poll.
    const streamingKeys = new Set();
    const streamSources = {};
    const streamCoalescer = createStreamCoalescer({
      rAF: function (cb) { return window.requestAnimationFrame(cb); },
      preFor: function (runKey) { return streamPreFor(runKey); },
      portalScroll: portalScroll,
      doc: document,
      cap: 16,
    });
    const detailLoadingCounts = new Map();
    const loadingDetailKeys = new Set();

    function syncDetailLoadingState(runKey) {
      const run = findRunByIdentity(runKey);
      const detailKey = run && run.key ? run.key : runKey;
      const detail = runsBody.querySelector('tr.detail-row[data-detail-for="' + CSS.escape(detailKey) + '"]');
      if (!detail) return;
      const panel = detail.querySelector('.detail-panel');
      if (!panel) return;
      setDetailLoadingState(panel, loadingDetailKeys.has(subjectTabKey(runKey)));
    }

    function setDetailLoading(runKey, loading) {
      const subjectKey = subjectTabKey(runKey);
      if (!subjectKey) return false;
      const current = detailLoadingCounts.get(subjectKey) || 0;
      const next = loading ? current + 1 : Math.max(0, current - 1);
      const changed = current !== next;
      if (next > 0) {
        detailLoadingCounts.set(subjectKey, next);
        loadingDetailKeys.add(subjectKey);
      } else {
        detailLoadingCounts.delete(subjectKey);
        loadingDetailKeys.delete(subjectKey);
      }
      syncDetailLoadingState(subjectKey);
      return changed;
    }

    function streamPreFor(runKey) {
      const detail = runsBody.querySelector('tr.detail-row[data-detail-for="' + CSS.escape(runKey) + '"]');
      return detail ? detail.querySelector('pre[data-scroll-key]') : null;
    }

    // createStreamCoalescer buffers SSE lines per run, deduplicates against
    // the run's known-lines set, and flushes in a single rAF callback.
    // Each flush tokenizes the joined batch through `highlight` once and
    // appends the highlighted result to the run's <pre> via a single
    // DocumentFragment. The factory is the only path that mutates the
    // streaming <pre> from SSE traffic (replacing the per-line
    // appendStreamLine scratch-and-walk pattern, which used to run on the
    // main thread on every SSE message and could land between a user
    // click and its rAF render, adding long-task latency).
    //
    // opts:
    //   rAF         — injected scheduler (production: window.requestAnimationFrame)
    //   highlight   — tokenize function (production: joined => SandmanPortalDiff.highlightTerminalLog(joined))
    //   preFor      — resolver to the run's <pre> (production: streamPreFor)
    //   portalScroll— sticky-bottom helper (production: window.SandmanPortalScroll)
    //   doc         — document injection for createDocumentFragment (production: document)
    //   cap         — buffer cap (default 16); overflow trips a synchronous flush
    function createStreamCoalescer(opts) {
      const rAF = opts && opts.rAF ? opts.rAF : function (cb) { return (window.requestAnimationFrame || function (c) { setTimeout(c, 16); })(cb); };
      const highlight = opts && opts.highlight ? opts.highlight : function (joined) { return SandmanPortalDiff.highlightTerminalLog(joined); };
      const preFor = opts && opts.preFor ? opts.preFor : function (runKey) { return streamPreFor(runKey); };
      const portalScrollRef = opts && opts.portalScroll ? opts.portalScroll : portalScroll;
      const docRef = opts && opts.doc ? opts.doc : document;
      const cap = opts && typeof opts.cap === 'number' && opts.cap > 0 ? opts.cap : 16;
      const buffers = {}; // runKey -> Array<string> (FIFO order)
      const scheduled = {}; // runKey -> true if a trailing rAF is queued
      const knownByRun = {}; // runKey -> Set<string>
      const debug = { enabled: false, flushes: 0 };

      function getKnown(runKey) {
        if (!knownByRun[runKey]) knownByRun[runKey] = new Set();
        return knownByRun[runKey];
      }

      function getBuffer(runKey) {
        if (!buffers[runKey]) buffers[runKey] = [];
        return buffers[runKey];
      }

      function flushRun(runKey) {
        const buf = buffers[runKey];
        if (!buf || buf.length === 0) return 0;
        const pre = preFor(runKey);
        if (!pre) {
          // No pre attached (e.g. detail row torn down); drop the buffer
          // to avoid unbounded growth until a pre materialises.
          buffers[runKey] = [];
          return 0;
        }
        // Tail-most-first: if the buffer grew past cap, keep the most
        // recent `cap` lines. The tail of a live stream is what
        // matters most; the leading rAF or a follow-up rAF handles
        // older lines if needed.
        let toFlush;
        let trimmed = 0;
        if (buf.length > cap) {
          trimmed = buf.length - cap;
          toFlush = buf.slice(trimmed);
        } else {
          toFlush = buf;
        }
        const joined = toFlush.join('\n') + '\n';
        const html = highlight(joined);
        const frag = docRef.createDocumentFragment();
        const scratch = docRef.createElement('div');
        scratch.innerHTML = html;
        while (scratch.firstChild) frag.appendChild(scratch.firstChild);
        pre.appendChild(frag);
        const known = getKnown(runKey);
        for (let i = 0; i < toFlush.length; i++) known.add(toFlush[i]);
        const previous = pre.getAttribute('data-rendered-log') || '';
        pre.setAttribute('data-rendered-log', previous + joined);
        if (portalScrollRef && portalScrollRef.isSticky && portalScrollRef.isSticky(runKey)) {
          pre.scrollTop = pre.scrollHeight;
        }
        if (debug.enabled) debug.flushes += 1;
        const drained = buf.length;
        buffers[runKey] = [];
        scheduled[runKey] = false;
        if (trimmed > 0 && debug.enabled) console.warn('coalescer: trimmed ' + trimmed + ' lines from buffer past cap=' + cap);
        return drained;
      }

      function scheduleRaf(runKey) {
        if (scheduled[runKey]) return;
        scheduled[runKey] = true;
        rAF(function () { flushRun(runKey); });
      }

      function scheduleLine(runKey, line) {
        const known = getKnown(runKey);
        if (known.has(line)) return;
        // Dedup within the same buffered batch.
        const buf = getBuffer(runKey);
        if (buf.indexOf(line) !== -1) return;
        buf.push(line);
        known.add(line);
        // Do not sync-flush on overflow; the trailing rAF will flush the
        // buffered batch in one highlight + DocumentFragment append, with
        // tail-only truncation if the buffer has grown past cap. The
        // 100-message burst still yields <=3 flushes because messages
        // arriving within one event-loop task coalesce into the same rAF.
        scheduleRaf(runKey);
      }

      function clearBuffer(runKey) {
        buffers[runKey] = [];
        scheduled[runKey] = false;
      }

      function seedKnownLines(runKey, lines) {
        const known = getKnown(runKey);
        known.clear();
        for (let i = 0; i < (lines || []).length; i++) known.add(lines[i]);
      }

      function pendingSize(runKey) {
        const buf = buffers[runKey];
        return buf ? buf.length : 0;
      }

      return {
        scheduleLine: scheduleLine,
        flushPending: function (runKey) { return flushRun(runKey); },
        clearBuffer: clearBuffer,
        seedKnownLines: seedKnownLines,
        pendingSize: pendingSize,
        _debug: {
          enableCounters: function () { debug.enabled = true; },
          flushCount: function () { return debug.flushes; },
          resetCounters: function () { debug.flushes = 0; },
        },
      };
    }

    function appendStreamLine(runKey, line) {
      // Coalescer is the only path that mutates the streaming <pre>.
      // appendStreamLine is kept as a thin shim for any pre-existing
      // callers (e.g. tests or inline hot-reload hooks) so they still
      // route into the rAF-coalesced flush path.
      streamCoalescer.scheduleLine(runKey, line);
    }

    function startRunStream(run) {
      if (!run || run.kind !== 'active' || !run.socketPath) return;
      if (streamSources[run.key]) return;
      const backendKey = run.backendKey || run.key;
      const pre = streamPreFor(run.key);
      let cachedLog = '';
      if (pre) {
        cachedLog = pre.getAttribute('data-rendered-log') || '';
        if (!cachedLog) {
          while (pre.firstChild) pre.removeChild(pre.firstChild);
          pre.setAttribute('data-rendered-log', '');
        }
      }
      streamCoalescer.seedKnownLines(run.key, cachedLog.split('\n').filter(Boolean));
      streamCoalescer.clearBuffer(run.key);
      const src = new EventSource(streamPath + '?runKey=' + encodeURIComponent(backendKey));
      src.onmessage = function (ev) { streamCoalescer.scheduleLine(run.key, ev.data); };
      src.onerror = function () {
        stopRunStream(run.key);
      };
      streamSources[run.key] = src;
      streamingKeys.add(run.key);
    }

    function stopRunStream(runKey) {
      const src = streamSources[runKey];
      if (src) {
        src.close();
        delete streamSources[runKey];
      }
      streamingKeys.delete(runKey);
    }

    function stopAllRunStreams() {
      for (const key of Object.keys(streamSources)) {
        streamSources[key].close();
        delete streamSources[key];
      }
      streamingKeys.clear();
    }

    // reconcileRunStreams keeps the SSE lifecycle in step with the view:
    // stream the expanded run only when it is active and the Log tab is
    // selected; close otherwise. Called from render() after each poll.
    function reconcileRunStreams() {
      const key = state.expandedRunKey;
      if (!key) { stopAllRunStreams(); return; }
      const run = findRunByIdentity(key);
      if (isWaitStateRun(run)) { stopAllRunStreams(); return; }
      const runKey = run ? run.key : key;
      const subjectKey = isWaitStateRun(run) ? '' : (subjectRunIdentity(run) || key);
      const tab = state.tabs[subjectKey] || state.tabs[key] || 'log';
      const wantStream = run && tab === 'log' && run.kind === 'active' && run.socketPath;
      for (const openKey of Object.keys(streamSources)) {
        if (openKey !== runKey) {
          // Subject switch: any buffered (not-yet-flushed) lines for the
          // previous run must not leak onto the new run's <pre>.
          streamCoalescer.clearBuffer(openKey);
          stopRunStream(openKey);
        }
      }
      if (wantStream) {
        startRunStream(run);
      } else {
        stopRunStream(runKey);
      }
    }

    function syncFilterToggleButtons() {
      if (activeBatchesToggle) activeBatchesToggle.setAttribute('aria-pressed', String(state.activeBatches));
      if (archivedToggle) archivedToggle.setAttribute('aria-pressed', String(state.showArchived));
    }

    function persistPortalViewState() {
      if (!portalState) return;
      portalState.save({
        expandedRunKey: state.expandedRunKey,
        tabs: state.tabs,
        showArchived: state.showArchived,
        activeBatches: state.activeBatches,
        sortBy: state.sortBy,
        sortDir: state.sortDir,
      });
    }

    function normalizePortalViewState() {
      if (!portalState) return;
      const visibleRuns = state.runs.filter(shouldShowRun);
      const normalized = portalState.normalize({
        expandedRunKey: state.expandedRunKey,
        tabs: state.tabs,
      }, visibleRuns, state.runs);
      if (!normalized.changed) return;
      state.expandedRunKey = normalized.state.expandedRunKey;
      state.tabs = normalized.state.tabs;
      persistPortalViewState();
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatTime(value) {
      if (!value) return '—';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '—';
      return new Intl.DateTimeFormat(undefined, {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        month: 'short',
        day: '2-digit',
      }).format(date);
    }

    function formatDuration(value) {
      return value && String(value).trim() ? value : '—';
    }

    function formatIssueTitle(run) {
      return run.issueTitle || '—';
    }

    function formatSource(run) {
      if (run.kind === 'active' && run.socketPath) return run.socketPath;
      if (run.logPath) return run.logPath;
      return '—';
    }

    function findRunByKey(runKey) {
      if (!runKey || !Array.isArray(state.runs)) return null;
      return state.runs.find((run) => run && run.key === runKey) || null;
    }

    function findRunByIdentity(runIdentity) {
      if (!runIdentity || !Array.isArray(state.runs)) return null;
      return state.runs.find((run) => run && (run.key === runIdentity || run.runId === runIdentity)) || null;
    }

    function normalizeRunIdentity(run) {
      if (!run || !run.runId) return run;
      if (run.key === run.runId) return run;
      return { ...run, backendKey: run.key, key: run.runId };
    }

    function subjectRunIdentity(run) {
      if (isWaitStateRun(run)) return '';
      return run ? (run.runId || run.key || '') : '';
    }

    function isWaitStateRun(run) {
      const status = String(run && run.status || '').trim().toLowerCase();
      return status === 'queued' || status === 'blocked';
    }

    function findRunRowByIdentity(runIdentity) {
      if (!runIdentity) return null;
      const run = findRunByIdentity(runIdentity);
      const runKey = run ? (visibleRunForIssueGroup(run.issueNumber, state.runs)?.key || run.key) : runIdentity;
      return Array.from(runsBody.children).find((child) => child.getAttribute('data-run-key') === runKey) || null;
    }

    function subjectTabKey(runIdentity) {
      const run = findRunByIdentity(runIdentity);
      if (isWaitStateRun(run)) return '';
      return subjectRunIdentity(run) || runIdentity || '';
    }

    async function abortRun(button, runKey, issue) {
      const previousLabel = button ? button.textContent : '';
      if (button) {
        button.disabled = true;
        button.textContent = 'Aborting...';
      }
      try {
        const res = await fetch(abortPath, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ runKey, issue }),
        });
        const text = await res.text();
        let body;
        try {
          body = JSON.parse(text);
        } catch {
          body = {};
        }
        if (!res.ok) throw new Error(body.error || body.message || text.trim() || 'abort failed');
        errorBanner.style.display = 'none';
        errorBanner.textContent = '';
        await refresh();
      } catch (err) {
        errorBanner.textContent = 'Abort failed: ' + err.message;
        errorBanner.style.display = 'block';
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent = previousLabel || 'Abort';
        }
      }
    }

    async function archiveRun(button, runId, label) {
      const previousLabel = button ? button.textContent : '';
      if (button) {
        button.disabled = true;
        button.textContent = 'Archiving...';
      }
      try {
        const res = await fetch(archivePath, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ runId }),
        });
        const text = await res.text();
        let body;
        try {
          body = JSON.parse(text);
        } catch {
          body = {};
        }
        if (!res.ok) throw new Error(body.error || body.message || text.trim() || 'archive failed');
        errorBanner.style.display = 'none';
        errorBanner.textContent = '';
        await refresh();
      } catch (err) {
        errorBanner.textContent = 'Archive failed: ' + err.message;
        errorBanner.style.display = 'block';
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent = previousLabel || 'Archive';
        }
      }
    }

    function sortStatusValues(values) {
      const order = ['all', 'success', 'failure', 'aborted'];
      return Array.from(values).sort((a, b) => {
        const ai = order.indexOf(a);
        const bi = order.indexOf(b);
        if (ai >= 0 && bi >= 0) return ai - bi;
        if (ai >= 0) return -1;
        if (bi >= 0) return 1;
        return a.localeCompare(b);
      });
    }

    function syncStatusOptions(runs) {
      const statuses = new Set(['all', 'success', 'failure', 'aborted']);
      const nextStatuses = sortStatusValues(statuses);
      const current = state.selectedStatus || 'all';
      const want = nextStatuses.includes(current) ? current : 'all';
      state.selectedStatus = want;

      // Rebuild the chip rail only when the set of statuses changes; this
      // keeps the click handlers stable between polls and avoids resetting
      // focus while the user is interacting with the rail.
      const existing = statusChips ? Array.from(statusChips.querySelectorAll('.fchip[data-status]')).map((c) => c.getAttribute('data-status')) : [];
      const same = existing.length === nextStatuses.length && existing.every((v, i) => v === nextStatuses[i]);
      if (same) {
        if (statusChips) {
          for (const chip of statusChips.querySelectorAll('.fchip[data-status]')) {
            chip.setAttribute('aria-pressed', String(chip.getAttribute('data-status') === want));
          }
        }
        if (statusFilter) statusFilter.value = want;
        return;
      }
      if (!statusChips) return;
      statusChips.innerHTML = '';
      if (statusFilter) statusFilter.innerHTML = '';
      for (const value of nextStatuses) {
        if (statusFilter) {
          const option = document.createElement('option');
          option.value = value;
          option.textContent = statusFilterLabel(value);
          option.selected = value === want;
          statusFilter.appendChild(option);
        }
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'fchip';
        chip.setAttribute('data-status', value);
        chip.setAttribute('aria-pressed', String(value === want));
        chip.textContent = statusFilterLabel(value);
        chip.addEventListener('click', () => {
          state.selectedStatus = value;
          for (const c of statusChips.querySelectorAll('.fchip[data-status]')) {
            c.setAttribute('aria-pressed', String(c.getAttribute('data-status') === value));
          }
          if (statusFilter) statusFilter.value = value;
          scheduleRender();
        });
        statusChips.appendChild(chip);
      }
    }

    function toggleSort(key) {
      if (!key) return;
      if (state.sortBy !== key) {
        state.sortBy = key;
        state.sortDir = key === 'status' ? 'asc' : 'desc';
      } else if (state.sortDir === 'desc') {
        state.sortDir = 'asc';
      } else {
        state.sortBy = 'server';
        state.sortDir = 'desc';
      }
      persistPortalViewState();
      scheduleRender();
    }

    function syncSortButtons() {
      for (const button of sortButtons) {
        const key = button.getAttribute('data-sort') || '';
        const active = state.sortBy === key && state.sortBy !== 'server';
        button.setAttribute('aria-pressed', String(active));
        const indicator = button.querySelector('.sort-indicator');
        if (!indicator) continue;
        indicator.textContent = active ? (state.sortDir === 'asc' ? '↑' : '↓') : '';
      }
    }

    function runStartedValue(run) {
      const ts = Date.parse(run && run.startedAt);
      return Number.isFinite(ts) ? ts : 0;
    }

    function runDurationValue(run) {
      const started = runStartedValue(run);
      if (!started) return 0;
      const finished = Date.parse(run && run.finishedAt);
      const end = Number.isFinite(finished) ? finished : Date.now();
      return Math.max(0, end - started);
    }

    function sortedVisibleRuns(runs) {
      if (state.sortBy === 'server') {
        return runs
          .map((run, index) => ({ run, index }))
          .sort((a, b) => {
            const cmp = runStartedValue(b.run) - runStartedValue(a.run);
            return cmp !== 0 ? cmp : a.index - b.index;
          })
          .map((entry) => entry.run);
      }
      const dir = state.sortDir === 'asc' ? 1 : -1;
      return runs
        .map((run, index) => ({ run, index }))
        .sort((a, b) => {
          let cmp = 0;
          if (state.sortBy === 'status') {
            cmp = String(a.run.status || '').localeCompare(String(b.run.status || ''));
          } else if (state.sortBy === 'archived') {
            cmp = Number(Boolean(a.run.archived)) - Number(Boolean(b.run.archived));
          } else if (state.sortBy === 'started') {
            cmp = runStartedValue(a.run) - runStartedValue(b.run);
          } else if (state.sortBy === 'duration') {
            cmp = runDurationValue(a.run) - runDurationValue(b.run);
          }
          if (cmp === 0) return a.index - b.index;
          return cmp * dir;
        })
        .map((entry) => entry.run);
    }

    function statusFilterValue(run) {
      if (!run) return 'all';
      const status = String(run.status || '').trim().toLowerCase();
      if (status === 'success') return 'success';
      if (status === 'failure' || status === 'failed' || status === 'error') return 'failure';
      if (status === 'aborted') return 'aborted';
      return status || 'other';
    }

    function statusFilterLabel(value) {
      switch (value) {
        case 'all': return 'All';
        case 'success': return 'Success';
        case 'failure': return 'Failure';
        case 'aborted': return 'Aborted';
        default:
          return String(value || '').charAt(0).toUpperCase() + String(value || '').slice(1);
      }
    }

    function shouldShowRun(run) {
      if (state.activeBatches) return run.kind === 'active';
      if (state.showArchived) return !!run.archived;
      if (run.archived) return false;
      if (state.selectedStatus !== 'all' && statusFilterValue(run) !== state.selectedStatus) return false;
      return true;
    }

    function statusClass(item) {
      const status = (item.status || '').toLowerCase();
      if (status === 'running') return 'running';
      if (status === 'reviewing') return 'reviewing';
      if (status === 'active') return 'active';
      if (status === 'success') return 'success';
      if (status === 'failure' || status === 'failed' || status === 'error') return 'failure';
      if (status === 'warning' || status === 'stale' || status === 'blocked') return 'warning';
      if (status === 'aborted') return 'aborted';
      return status || 'default';
    }

    function reviewVerdictForStatus(status) {
      const value = String(status || '').trim();
      if (value === 'success') return 'Approved';
      if (value === 'failure') return 'Changes requested';
      return '';
    }

    function summarizeReviewGroup(reviews) {
      const summary = { count: 0, live: false, verdict: '', status: '', kind: 'completed', source: null };
      if (!Array.isArray(reviews) || !reviews.length) return summary;
      summary.count = reviews.length;
      const ordered = reviews.slice().sort((a, b) => {
        const aStarted = a && a.startedAt ? new Date(a.startedAt).getTime() : 0;
        const bStarted = b && b.startedAt ? new Date(b.startedAt).getTime() : 0;
        if (aStarted !== bStarted) return bStarted - aStarted;
        return String((a && a.runId) || (a && a.key) || '').localeCompare(String((b && b.runId) || (b && b.key) || ''));
      });
      summary.source = ordered[0] || null;
      for (const review of ordered) {
        const status = String(review && review.status ? review.status : '').trim();
        if (status === 'reviewing') {
          summary.live = true;
          summary.kind = 'active';
          summary.status = 'reviewing';
          break;
        }
      }
      if (!summary.live) {
        for (const review of ordered) {
          const verdict = reviewVerdictForStatus(review && review.status);
          if (verdict) {
            summary.verdict = verdict;
            summary.status = String(review && review.status ? review.status : '').trim();
            summary.kind = 'completed';
            break;
          }
        }
      }
      return summary;
    }

    function pickCanonicalParent(parents) {
      const liveActive = parents.filter((candidate) => candidate.kind === 'active');
      if (liveActive.length) {
        return liveActive.reduce((best, candidate) => (candidate.startedAt > best.startedAt ? candidate : best));
      }
      return parents.find((candidate) => Number(candidate.reviewCount || 0) > 0 || candidate.reviewVerdict) || parents[0];
    }

    function hasLiveReviewChild(group) {
      if (!Array.isArray(group)) return false;
      return group.some((run) => run && run.review && run.kind === 'active');
    }

    function visibleRunForIssueGroup(issueNumber, runs) {
      if (!Number.isInteger(issueNumber) || issueNumber <= 0 || !Array.isArray(runs)) return null;
      const group = runs.filter((run) => run && run.issueNumber === issueNumber);
      if (!group.length) return null;
      const parents = group.filter((run) => !run.review);
      if (parents.length) {
        const picked = pickCanonicalParent(parents);
        if (picked && hasLiveReviewChild(group)) {
          return Object.assign({}, picked, { status: 'reviewing', liveReview: true });
        }
        return picked;
      }
      const summary = summarizeReviewGroup(group.filter((run) => run.review));
      const source = summary.source || group[0];
      if (!source) return null;
      const issueLabel = 'Review of #' + String(issueNumber);
      return {
        key: source.key,
        runId: source.runId,
        review: true,
        groupedReview: false,
        reviewCount: summary.count,
        reviewVerdict: summary.verdict,
        status: summary.status || (summary.live ? 'reviewing' : String(source.status || '').trim()),
        kind: summary.kind,
        issueNumber: issueNumber,
        prNumber: source.prNumber,
        startedAt: source.startedAt,
        duration: source.duration,
        archived: !!source.archived,
        unavailable: !!source.unavailable,
        reason: source.reason,
        issueLabel: issueLabel,
      };
    }

    function visibleRunsForTable(runs) {
      if (!Array.isArray(runs)) return [];
      const byIssue = new Map();
      const passthrough = [];
      for (const run of runs) {
        if (!run) continue;
        if (!Number.isInteger(run.issueNumber) || run.issueNumber <= 0) {
          passthrough.push(run);
          continue;
        }
        const group = byIssue.get(run.issueNumber) || [];
        group.push(run);
        byIssue.set(run.issueNumber, group);
      }
      const visible = [...passthrough];
      const grouped = Array.from(byIssue.entries()).map(([issueNumber, group]) => ({
        issueNumber,
        visibleRun: visibleRunForIssueGroup(issueNumber, group),
      })).filter((entry) => entry.visibleRun);
      grouped.sort((a, b) => {
        const startedCmp = runStartedValue(b.visibleRun) - runStartedValue(a.visibleRun);
        if (startedCmp !== 0) return startedCmp;
        return a.issueNumber - b.issueNumber;
      });
      for (const entry of grouped) {
        visible.push(entry.visibleRun);
      }
      return visible;
    }

    function renderRunMeta(run) {
      const lines = [];
      const counterParts = [];
      if (run.batchKey) {
        lines.push('Batch: ' + run.batchKey);
      }
      const retryCount = Number(run.retriesDone || 0) > 0
        ? Number(run.retriesDone || 0)
        : Number(run.attempts || 0);
      if (retryCount > 0) {
        counterParts.push(retryCount + ' retr' + (retryCount === 1 ? 'y' : 'ies'));
      }
      if (Number(run.reviewCount || 0) > 0) {
        const count = Number(run.reviewCount || 0);
        const reviewPart = count + ' review' + (count === 1 ? '' : 's');
        if (run.reviewVerdict) {
          counterParts.push(reviewPart + ' - ' + run.reviewVerdict);
        } else {
          counterParts.push(reviewPart);
        }
      }
      const status = String(run.status || '').toLowerCase();
      if (run.runId && status !== 'queued' && status !== 'blocked') lines.push('Run: ' + run.runId);
      if (counterParts.length) lines.push(counterParts.join(' - '));
      return lines.length ? lines.join('\n') : 'Run';
    }

    function renderTerminalContent(text) {
      const value = String(text || '');
      if (!value) return '';
      return SandmanPortalDiff.highlightTerminalLog(value);
    }

    function isRunAbortable(run, abortReservations) {
      if (!run || run.kind !== 'active') return false;
      if (run.status !== 'running' && run.status !== 'reviewing' && run.status !== 'queued' && run.status !== 'blocked') return false;
      if (!run.batchKey) return false;
      const reservationKey = run.key + ':' + String(run.issueNumber != null ? run.issueNumber : '');
      if (abortReservations && abortReservations.has && abortReservations.has(reservationKey)) return false;
      return true;
    }

    function isRunArchivable(run) {
      if (!run || run.kind !== 'completed') return false;
      if (run.archived) return false;
      if (run.unavailable) return false;
      if (run.sourceExists === false) return false;
      if (!run.runId) return false;
      return true;
    }

    function render() {
      syncStatusOptions(state.runs);
      normalizePortalViewState();
      syncFilterToggleButtons();
      const grouped = visibleRunsForTable(state.runs);
      const filtered = sortedVisibleRuns(grouped.filter(shouldShowRun));
      syncSortButtons();
      const activeCount = state.runs.filter((run) => run && run.kind === 'active').length;
      const completedCount = state.runs.filter((run) => run && run.kind === 'completed').length;
      summaryPill.innerHTML = '<span class="dot"></span><strong>' + filtered.length + '</strong><span class="summary-label">runs visible</span>';
      const scrollStates = portalScroll ? portalScroll.capture(runsBody.querySelectorAll('[data-scroll-key]')) : {};
      const abortReservations = new Set();
      const diffOpts = {
        helpers: {
          escapeHTML: escapeHTML,
          formatTime: formatTime,
          formatDuration: formatDuration,
          formatIssueTitle: formatIssueTitle,
          formatSource: formatSource,
          statusClass: statusClass,
          renderRunMeta: renderRunMeta,
          renderTerminalContent: renderTerminalContent,
          isRunAbortable: isRunAbortable,
          isRunArchivable: isRunArchivable,
          highlightJSON: SandmanPortalDiff.highlightJSON,
        },
        abortReservations: abortReservations,
        abortSupported: abortSupported,
        archiveSupported: true,
        expandedKey: state.expandedRunKey,
        tabs: state.tabs,
        runs: state.runs,
        visibleRuns: filtered,
        streamingKeys: streamingKeys,
        loadingDetailKeys: loadingDetailKeys,
      };
      if (!state.runs.length) {
        portalDiff.setEmpty(runsBody, '<div class="empty-state">' + escapeHTML(state.loading ? 'Loading runs.' : 'No Sandman runs found.') + '</div>', 6);
      } else if (!filtered.length) {
        if (!state.loading && activeCount === 0 && completedCount > 0) {
          portalDiff.setEmpty(runsBody, '<div class="empty-state">All clear — 0 active, ' + escapeHTML(String(completedCount)) + ' completed.</div>', 6);
        } else {
          portalDiff.setEmpty(runsBody, '<div class="empty-state">No runs match the current filters.</div>', 6);
        }
      } else {
        portalDiff.diffRuns(runsBody, filtered, diffOpts);
      }
      if (portalScroll && scrollStates) {
        portalScroll.restore(runsBody.querySelectorAll('[data-scroll-key]'), scrollStates);
      }
      reconcileRunStreams();
    }

    let renderScheduled = false;
    let renderCallback = null;

    function scheduleRender(callback) {
      if (renderScheduled) {
        if (callback) renderCallback = callback;
        return;
      }
      renderScheduled = true;
      if (callback) renderCallback = callback;
      window.requestAnimationFrame(() => {
        try {
          render();
          if (renderCallback) {
            const cb = renderCallback;
            renderCallback = null;
            cb();
          }
        } finally {
          renderScheduled = false;
        }
      });
    }

    // Poll-health tracking: one chip shows last successful refresh time.
    // Warn after consecutive failures so a wedged poll is visible.
    const pollHealthEl = document.getElementById('poll-health');
    const pollHealthUpdated = document.getElementById('last-updated');
    const pollHealthWarnThreshold = 2;
    let lastPollAt = null;
    let pollFailCount = 0;

    function formatUpdatedAt(timestamp) {
      return new Intl.DateTimeFormat(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' }).format(new Date(timestamp));
    }

    function updatePollHealth() {
      if (!pollHealthEl || !pollHealthUpdated) return;
      if (lastPollAt === null) {
        pollHealthUpdated.textContent = 'Waiting for first refresh';
        pollHealthEl.classList.remove('ok', 'warn');
        pollHealthEl.title = 'Portal poll health';
        return;
      }
      pollHealthUpdated.textContent = formatUpdatedAt(lastPollAt);
      if (pollFailCount >= pollHealthWarnThreshold) {
        pollHealthEl.classList.remove('ok');
        pollHealthEl.classList.add('warn');
        pollHealthEl.title = 'Portal poll health (poll failing)';
        return;
      }
      pollHealthEl.classList.remove('warn');
      pollHealthEl.classList.add('ok');
      pollHealthEl.title = 'Portal poll health';
    }

    async function refresh() {
      try {
        const prevRuns = Array.isArray(state.runs) ? state.runs.slice() : [];
        const res = await fetch(apiPath + '?summary=1', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const payload = await res.json();
        const nextRuns = Array.isArray(payload.runs) ? payload.runs.map(normalizeRunIdentity) : [];
        // Merge existing detail (log/events) into the summary payload so expanded
        // runs keep their content across polls without a full re-fetch.
        for (const next of nextRuns) {
          const existing = prevRuns.find((r) => r && (r.key === next.key || r.runId === next.runId));
          if (existing && existing.log && !next.log) {
            next.log = existing.log;
          }
          if (existing && existing.events && !next.events) {
            if (existing.kind !== 'active') {
              next.events = existing.events;
            }
          }
        }
        if (state.expandedRunKey) {
          const cached = prevRuns.find((run) => run && (run.key === state.expandedRunKey || run.runId === state.expandedRunKey));
          const issueNumber = cached ? cached.issueNumber : 0;
          const issueParent = issueNumber > 0 ? prevRuns.find((run) => {
            if (!run || run.issueNumber !== issueNumber || run.review) return false;
            const label = String(run.issueLabel || '').trim();
            return Number(run.reviewCount || 0) > 0 || !!run.reviewVerdict || label === ('#' + String(issueNumber));
          }) : null;
          for (const issueRun of [cached, issueParent]) {
            if (!issueRun) continue;
            if (!nextRuns.some((run) => run && (run.key === issueRun.key || run.runId === issueRun.runId))) {
              nextRuns.unshift(issueRun);
            }
          }
        }
	      state.runs = nextRuns;
	      state.loading = false;
	      errorBanner.style.display = 'none';
	      errorBanner.textContent = '';
	      lastPollAt = Date.now();
	      pollFailCount = 0;
	      updatePollHealth();
	      normalizePortalViewState();
	      if (state.expandedRunKey) {
	        loadRunDetail(state.expandedRunKey);
	      }
	      scheduleRender();
	      scheduleLogPanePrewarm();
	    } catch (err) {
        state.loading = false;
        errorBanner.textContent = 'Refresh failed: ' + err.message;
        errorBanner.style.display = 'block';
        pollFailCount += 1;
        updatePollHealth();
      }
    }

    async function loadRunDetail(runKey, opts) {
      const run = findRunByIdentity(runKey);
      if (!run) return;
      if (isWaitStateRun(run)) return;
      const forceFetch = !!(opts && opts.forceFetch);
      const tabKey = run.runId || run.key;
      const currentTab = String((state.tabs && (state.tabs[tabKey] || state.tabs[run.key])) || 'log').trim();
      const subjectKey = subjectTabKey(runKey);
      if (currentTab === 'details' && !forceFetch) return;
      if (loadingDetailKeys.has(subjectKey)) return;
      const hasLog = run.log && String(run.log).trim();
      const hasEvents = Object.prototype.hasOwnProperty.call(run, 'events');
      if (currentTab === 'events' && hasEvents && run.kind !== 'active') return;
      if (currentTab !== 'events' && hasLog) return;
      setDetailLoading(runKey, true);
      scheduleRender();
      try {
        const res = await fetch(apiPath + '?runKey=' + encodeURIComponent(run.backendKey || run.key));
        if (!res.ok) return;
        const payload = await res.json();
        if (!payload || !payload.run) return;
        const detail = normalizeRunIdentity(payload.run);
        const idx = state.runs.findIndex((r) => r && (r.key === detail.key || r.runId === detail.runId));
        if (idx >= 0) {
          const existing = state.runs[idx];
          state.runs[idx] = {
            ...existing,
            log: hasLog ? existing.log : detail.log,
            events: detail.events || existing.events,
            logUrl: detail.logUrl,
          };
          scheduleRender();
        }
      } catch (err) {
        // detail fetch failures are non-fatal; user can retry by toggling again
      } finally {
        if (setDetailLoading(runKey, false)) scheduleRender();
      }
    }

    function toggleRun(runKey) {
      const prevExpandedRunKey = state.expandedRunKey;
      let run = findRunByIdentity(runKey);
      if (!run) {
        const stubMatch = runKey.match(/^(?:issue|review-stub)-(\d+)$/);
        if (stubMatch) {
          const issueNum = Number(stubMatch[1]);
          const group = (state.runs || []).filter(r => r && r.issueNumber === issueNum);
          if (group.length) {
            const parents = group.filter(r => !r.review);
            if (parents.length) {
              run = parents.find(c => Number(c.reviewCount || 0) > 0 || c.reviewVerdict) || parents[0];
            } else {
              const summary = summarizeReviewGroup(group.filter(r => r.review));
              run = summary.source || null;
            }
          }
        }
      }
      if (isWaitStateRun(run)) return;
      const subjectKey = subjectRunIdentity(run) || runKey;
      if (state.expandedRunKey === subjectKey) {
        state.expandedRunKey = null;
      } else {
        state.expandedRunKey = subjectKey;
      }
      persistPortalViewState();
      const opening = state.expandedRunKey && state.expandedRunKey !== prevExpandedRunKey;
      if (opening) {
        loadRunDetail(state.expandedRunKey, { forceFetch: true });
      }
      scheduleRender(() => {
        if (opening) {
          const row = findRunRowByIdentity(state.expandedRunKey);
          if (row) {
            row.scrollIntoView({ behavior: 'instant', block: 'nearest' });
          }
        }
      });
    }

    runsBody.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (button) {
        const runKey = button.getAttribute('data-run-key');
        if (!runKey) return;
        const action = button.getAttribute('data-action');
        if (action === 'abort-run') {
          event.preventDefault();
          const run = findRunByKey(runKey);
          const issue = Number(button.getAttribute('data-issue') || run?.issueNumber || 0);
          const label = run?.issueLabel || 'this run';
          if (typeof window.confirm === 'function' && !window.confirm('Abort ' + label + '?')) return;
          abortRun(button, run?.backendKey || runKey, issue);
          return;
        }
        if (action === 'archive-run') {
          event.preventDefault();
          const run = findRunByKey(runKey);
          const runId = run?.backendKey || run?.key || run?.runId || button.getAttribute('data-run-id');
          if (!runId) return;
          const label = run?.issueLabel || 'this run';
          if (typeof window.confirm === 'function' && !window.confirm('Archive ' + label + '?')) return;
          archiveRun(button, runId, label);
          return;
        }
        if (action === 'set-tab') {
          const tab = button.getAttribute('data-tab') || 'log';
          const currentKey = state.expandedRunKey || runKey;
          const subjectKey = subjectTabKey(currentKey);
          state.tabs[subjectKey] = tab;
          state.expandedRunKey = subjectKey;
          persistPortalViewState();
          if (tab !== 'details') loadRunDetail(subjectKey);
          scheduleRender();
        }
        return;
      }

      const row = event.target.closest('tr[data-action="toggle-run"]');
      if (!row) return;
      const runKey = row.getAttribute('data-run-key');
      if (!runKey) return;
      const run = findRunByKey(runKey);
      if (isWaitStateRun(run)) return;
      toggleRun(runKey);
    });

    runsBody.addEventListener('change', (event) => {
      const select = event.target.closest('select[data-action="set-subject"]');
      if (!select) return;
      const nextRun = findRunByIdentity(select.value);
      if (!nextRun) return;
      const nextRunKey = nextRun.runId || nextRun.key;
      if (state.expandedRunKey === nextRunKey) return;
      const currentRunKey = state.expandedRunKey;
      const currentTabKey = currentRunKey ? subjectTabKey(currentRunKey) : '';
      const currentTab = currentTabKey && state.tabs[currentTabKey] ? state.tabs[currentTabKey] : 'log';
	      if (!state.tabs[nextRunKey]) {
	        state.tabs[nextRunKey] = currentTab;
	      }
	      if (currentRunKey) {
	        stopRunStream(currentRunKey);
	      }
	      state.expandedRunKey = nextRunKey;
	      persistPortalViewState();
	      scheduleRender(() => loadRunDetail(nextRunKey));
	    });

    runsBody.addEventListener('keydown', (event) => {
      if (event.target.closest('button, a, input, select, textarea')) return;
      const row = event.target.closest('tr[data-action="toggle-run"]');
      if (!row) return;
      if (event.key !== 'Enter' && event.key !== ' ') return;
      event.preventDefault();
      const runKey = row.getAttribute('data-run-key');
      if (runKey) toggleRun(runKey);
    });

    for (const button of sortButtons) {
      button.addEventListener('click', () => toggleSort(button.getAttribute('data-sort') || ''));
    }

    activeBatchesToggle.addEventListener('click', () => {
      state.activeBatches = !state.activeBatches;
      if (state.activeBatches) state.showArchived = false;
      syncFilterToggleButtons();
      persistPortalViewState();
      scheduleRender();
    });

    archivedToggle.addEventListener('click', () => {
      state.showArchived = !state.showArchived;
      if (state.showArchived) state.activeBatches = false;
      syncFilterToggleButtons();
      persistPortalViewState();
      scheduleRender();
    });

    if (statusFilter) {
      statusFilter.addEventListener('change', () => {
        state.selectedStatus = statusFilter.value;
        if (statusChips) {
          for (const chip of statusChips.querySelectorAll('.fchip[data-status]')) {
            chip.setAttribute('aria-pressed', String(chip.getAttribute('data-status') === state.selectedStatus));
          }
        }
        scheduleRender();
      });
    }

    window.addEventListener('pagehide', stopAllRunStreams);

    refresh();
    restartPolling();
    setInterval(updatePollHealth, 1000);
  </script>
</body>
</html>
