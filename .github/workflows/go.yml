name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  semantic-pull-request:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      TITLE: ${{ github.event.pull_request.title }}
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            chore
            docs
            refactor
            test
            build
            ci
            revert
          requireScope: false

      - name: Validate change-request title regex
        run: |
          if ! echo "$TITLE" | grep -Eq '^(feat|fix|perf|chore|docs|refactor|test|build|ci|revert|feat!|fix!|perf!)(\([a-z0-9-]+\))?!?: .+'; then
            echo "::error::Change-request title '$TITLE' does not match the Conventional Commits regex documented in AGENTS.md." >&2
            echo "::error::Expected: ^(feat|fix|perf|chore|docs|refactor|test|build|ci|revert|feat!|fix!|perf!)(\([a-z0-9-]+\))?!?: .+" >&2
            exit 1
          fi

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Podman
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Validate Podman
        if: runner.os == 'Linux'
        run: podman info

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files need formatting:"
            gofmt -l .
            exit 1
          fi

      - name: Test
        run: go test -race -v ./...
