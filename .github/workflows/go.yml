name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Podman
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Validate Podman
        if: runner.os == 'Linux'
        run: podman info

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files need formatting:"
            gofmt -l .
            exit 1
          fi

      - name: Test
        run: go test -race -v ./...

      - name: Java preset smoke test
        if: runner.os == 'Linux'
        run: go test -tags smoke -v -run TestInit_JavaPresetBuildsForEveryBuiltInAgentProvider ./internal/cmd/...
