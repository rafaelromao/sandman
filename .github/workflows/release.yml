name: Release

on:
  push:
    branches: [main]
  release:
    types: [released]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: go
          default-branch: main
      - uses: goreleaser/goreleaser-action@v6
        if: success()
        with:
          args: release --clean
          version: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
